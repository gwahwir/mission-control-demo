name: Lead Analyst Agent A Within Docker
description: >
  Orchestrator agent that fans out work to dynamically discovered specialist agents
  via A2A, collects their results, and returns a synthesized analysis.
  Specialists are selected autonomously based on relevance to the input.

dynamic_discovery: true
control_plane_url: http://control-plane:8000
min_specialists: 3

input_fields:
  - name: text
    label: Analysis Request
    type: textarea
    required: true
    placeholder: Enter the text or request for the lead analyst...
