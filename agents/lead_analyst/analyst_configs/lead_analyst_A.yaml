name: Lead Analyst Agent A
description: >
  Orchestrator agent that fans out work to downstream sub-agents
  via A2A, collects their results, and returns a synthesized analysis.

sub_agents:
  - label: ASEAN Security Analyst
    url: http://localhost:8006/asean-security
  - label: Realist IR Analyst
    url: http://localhost:8006/realist-ir
  - label: Taleb Antifragile Analyst
    url: http://localhost:8006/taleb-antifragile

input_fields:
  - name: text
    label: Analysis Request
    type: textarea
    required: true
    placeholder: Enter the text or request for the lead analyst...
