name: Lead Analyst Agent C Dynamic Discovery (Local)
description: >
  Orchestrator agent that fans out work to dynamically discovered specialist agents
  via A2A, collects their results, and returns a synthesized analysis.
  Specialists are selected autonomously based on relevance to the input.

dynamic_discovery: true
control_plane_url: http://localhost:8000
min_specialists: 3

input_fields:
  - name: text
    label: Scenario / Question
    type: textarea
    required: true
    placeholder: "Describe the situation or question to analyze..."

  - name: baselines
    label: Current Baseline Assessments
    type: textarea
    required: false
    placeholder: "Enter current baseline assessments or prior conclusions (used for change detection)..."

  - name: key_questions
    label: Key Questions
    type: textarea
    required: false
    placeholder: "Enter specific analytical questions to address (sent to specialists)..."
