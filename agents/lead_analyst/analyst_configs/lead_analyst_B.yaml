name: Lead Analyst Agent B - Local Dev
description: >
  Orchestrator agent that fans out work to downstream sub-agents
  via A2A, collects their results, and returns a synthesized analysis.

sub_agents:
  - label: ASEAN Security Analyst
    url: http://specialist:8006/asean-security
  - label: Realist IR Analyst
    url: http://specialist:8006/realist-ir
  - label: Black Swan Analyst
    url: http://specialist:8006/black-swan

input_fields:
  - name: text
    label: Scenario / Question
    type: textarea
    required: true
    placeholder: "Describe the situation or question to analyze..."

  - name: baselines
    label: Current Baseline Assessments
    type: textarea
    required: false
    placeholder: "Enter current baseline assessments or prior conclusions (used for change detection)..."

  - name: key_questions
    label: Key Questions
    type: textarea
    required: false
    placeholder: "Enter specific analytical questions to address (sent to specialists)..."
