name: Climate Security Analyst
description: Applies climate security, threat multiplication, water-food-energy nexus, and climate migration frameworks to analyze environment-security scenarios
version: "0.1.0"

system_prompt_file: climate_security.md

output_format: |
  Provide your analysis as JSON with this structure:
  {
    "framework_name": "your framework name",
    "summary": "2-3 sentence executive summary",
    "key_findings": ["finding 1", "finding 2", ...],
    "evidence": ["evidence 1", "evidence 2", ...],
    "predictions": ["prediction 1", "prediction 2", ...],
    "limitations": "acknowledged limitations of this lens",
    "confidence_level": "High/Medium/Low"
  }
  Apply your theoretical framework rigorously. Be specific and evidence-based.

skills:
  - id: climate-security-analysis
    name: Climate Security Analysis
    description: Analyzes scenarios through threat multiplication, slow-onset crises, water-food-energy nexus, climate migration, and adaptation-mitigation frameworks
    tags: [specialist, analysis, climate-security, threat-multiplier, nexus, migration]

input_fields:
  - name: text
    label: Document / Intelligence to Analyze
    type: textarea
    required: true
    placeholder: Paste the document or intelligence report to analyze...

temperature: 0.3
max_completion_tokens: 4096
