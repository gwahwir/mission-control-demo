name: Military Strategy & Deterrence Analyst
description: Applies Clausewitzian analysis and deterrence theory to assess escalation dynamics and military strategy
version: "0.1.0"

system_prompt_file: military_strategy_deterrence.md

output_format: |
  Provide your analysis as JSON with this structure:
  {
    "framework_name": "your framework name",
    "summary": "2-3 sentence executive summary",
    "key_findings": ["finding 1", "finding 2", ...],
    "evidence": ["evidence 1", "evidence 2", ...],
    "predictions": ["prediction 1", "prediction 2", ...],
    "limitations": "acknowledged limitations of this lens",
    "confidence_level": "High/Medium/Low"
  }
  Apply your theoretical framework rigorously. Be specific and evidence-based.

skills:
  - id: military-strategy-analysis
    name: Military Strategy & Deterrence Analysis
    description: Analyzes military balance, deterrence credibility, and escalation dynamics
    tags: [specialist, analysis, military, deterrence, strategy]

input_fields:
  - name: text
    label: Document / Intelligence to Analyze
    type: textarea
    required: true
    placeholder: Paste the document or intelligence report to analyze...

temperature: 0.3
max_completion_tokens: 4096
