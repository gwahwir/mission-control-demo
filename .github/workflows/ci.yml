name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python: lint + test ────────────────────────────────────────────────────
  python:
    name: Python lint & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio pytest-httpx structlog prometheus-fastapi-instrumentator

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check agents/ control_plane/ tests/

      - name: Run tests
        run: pytest tests/ -v

  # ── Dashboard: build ───────────────────────────────────────────────────────
  dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ── Docker: build images ───────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [python, dashboard]

    steps:
      - uses: actions/checkout@v4

      - name: Build echo-agent image
        run: docker build -f Dockerfile.agent -t mission-control/echo-agent:${{ github.sha }} .

      - name: Build control-plane image
        run: docker build -f Dockerfile.control-plane -t mission-control/control-plane:${{ github.sha }} .

      - name: Build dashboard image
        run: docker build -f dashboard/Dockerfile -t mission-control/dashboard:${{ github.sha }} dashboard/
