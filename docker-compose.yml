version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: missioncontrol
      POSTGRES_USER: mc
      POSTGRES_PASSWORD: mc_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mc -d missioncontrol"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - mc-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Summarizer Agent (started before echo-agent — echo forwards to it) ────
  summarizer:
    build:
      context: .
      dockerfile: Dockerfile.summarizer
    ports:
      - "8002:8002"
    environment:
      - LOG_LEVEL=INFO
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
    networks:
      - mc-net
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8002/.well-known/agent-card.json').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Echo Agent ─────────────────────────────────────────────────────────────
  echo-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "8001:8001"
    environment:
      - LOG_LEVEL=INFO
      - DOWNSTREAM_AGENT_URL=http://summarizer:8002
    networks:
      - mc-net
    depends_on:
      summarizer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/.well-known/agent-card.json').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Control Plane ──────────────────────────────────────────────────────────
  # Scale with: docker compose up --scale echo-agent=3
  # Add more agent types via AGENT_URLS:
  #   echo-agent@http://echo-agent:8001,summarizer@http://summarizer:8002
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.control-plane
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - AGENT_URLS=echo-agent@http://echo-agent:8001,summarizer@http://summarizer:8002
      - DATABASE_URL=postgresql://mc:mc_password@postgres:5432/missioncontrol
      - REDIS_URL=redis://redis:6379/0
    networks:
      - mc-net
    depends_on:
      echo-agent:
        condition: service_healthy
      summarizer:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/agents').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── React Dashboard ────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    networks:
      - mc-net
    depends_on:
      control-plane:
        condition: service_healthy
  
  network-tool:
    image: wbitt/network-multitool:latest
    networks:
      - mc-net


networks:
  mc-net:
    driver: bridge

volumes:
  postgres_data:
