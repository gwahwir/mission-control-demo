version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16-trixie
    environment:
      POSTGRES_DB: missioncontrol
      POSTGRES_USER: mc
      POSTGRES_PASSWORD: mc_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mc-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mc -d missioncontrol"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - mc-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  neo4j:
    image: neo4j:2026.02.2
    volumes:
      - neo4j_logs:/logs
      - neo4j_config:/config
      - neo4j_data:/data
      - neo4j_plugins:/plugins
    environment:
      - NEO4J_AUTH=neo4j/mc_password
    ports:
      - "7474:7474"
      - "7687:7687"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - mc-net

  # # ── pgvector DB (for Knowledge Graph Agent vector storage) ─────────────
  # pgvector-db:
  #   image: pgvector/pgvector:pg16
  #   environment:
  #     POSTGRES_DB: mem0_kg
  #     POSTGRES_USER: mem0
  #     POSTGRES_PASSWORD: mem0_password
  #   ports:
  #     - "5433:5432"
  #   volumes:
  #     - pgvector_data:/var/lib/postgresql/data
  #   networks:
  #     - mc-net
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U mem0 -d mem0_kg"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 10s

  # ── Control Plane (starts before agents so they can self-register) ────────
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.control-plane
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql://mc:mc_password@postgres:5432/missioncontrol
      - REDIS_URL=redis://redis:6379/0
    env_file: ".env"
    networks:
      - mc-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/agents').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Summarizer Agent ────────────────────────────────────────────────────────
  summarizer:
    build:
      context: .
      dockerfile: Dockerfile.summarizer
    ports:
      - "8002:8002"
    environment:
      - LOG_LEVEL=INFO
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - CONTROL_PLANE_URL=http://control-plane:8000
      - SUMMARIZER_AGENT_URL=http://summarizer:8002
    env_file: ".env"
    networks:
      - mc-net
    depends_on:
      control-plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8002/.well-known/agent-card.json').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Echo Agent ─────────────────────────────────────────────────────────────
  echo-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "8001:8001"
    environment:
      - LOG_LEVEL=INFO
      - DOWNSTREAM_AGENT_URL=http://summarizer:8002
      - CONTROL_PLANE_URL=http://control-plane:8000
      - ECHO_AGENT_URL=http://echo-agent:8001
    networks:
      - mc-net
    depends_on:
      control-plane:
        condition: service_healthy
      summarizer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/.well-known/agent-card.json').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Relevancy Agent ──────────────────────────────────────────────────────────
  relevancy:
    build:
      context: .
      dockerfile: Dockerfile.relevancy
    ports:
      - "8003:8003"
    environment:
      - LOG_LEVEL=INFO
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - CONTROL_PLANE_URL=http://control-plane:8000
      - RELEVANCY_AGENT_URL=http://relevancy:8003
    env_file: ".env"
    networks:
      - mc-net
    depends_on:
      control-plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8003/.well-known/agent-card.json').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Extraction Agent ───────────────────────────────────────────────────────
  extraction:
    build:
      context: .
      dockerfile: Dockerfile.extraction
    ports:
      - "8004:8004"
    environment:
      - LOG_LEVEL=INFO
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - CONTROL_PLANE_URL=http://control-plane:8000
      - EXTRACTION_AGENT_URL=http://extraction:8004
    env_file: ".env"
    networks:
      - mc-net
    depends_on:
      control-plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8004/.well-known/agent-card.json').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Lead Analyst Agent ─────────────────────────────────────────────────────
  lead-analyst:
    build:
      context: .
      dockerfile: Dockerfile.lead-analyst
    ports:
      - "8005:8005"
    env_file: ".env"
    environment:
      - LOG_LEVEL=INFO
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - CONTROL_PLANE_URL=http://control-plane:8000
      - LEAD_ANALYST_AGENT_URL=http://lead-analyst:8005
    networks:
      - mc-net
    depends_on:
      control-plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8005/').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Specialist Agent ───────────────────────────────────────────────────────
  specialist:
    build:
      context: .
      dockerfile: Dockerfile.specialist
    ports:
      - "8006:8006"
    env_file: ".env"
    environment:
      - LOG_LEVEL=INFO
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - CONTROL_PLANE_URL=http://control-plane:8000
      - SPECIALIST_AGENT_URL=http://specialist:8006
    networks:
      - mc-net
    depends_on:
      control-plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8006/').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Probability Forecasting Agent ──────────────────────────────────────────
  probability:
    build:
      context: .
      dockerfile: Dockerfile.probability
    ports:
      - "8007:8007"
    env_file: ".env"
    environment:
      - LOG_LEVEL=INFO
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - CONTROL_PLANE_URL=http://control-plane:8000
      - PROBABILITY_AGENT_URL=http://probability:8007
    networks:
      - mc-net
    depends_on:
      control-plane:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8007/.well-known/agent-card.json').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Knowledge Graph Agent ───────────────────────────────────────────────
  knowledge-graph-agent:
    build:
      context: .
      dockerfile: Dockerfile.knowledge-graph
    ports:
      - "8008:8008"
    env_file: ".env"
    environment:
      - LOG_LEVEL=INFO
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - CONTROL_PLANE_URL=http://control-plane:8000
      - KNOWLEDGE_GRAPH_AGENT_URL=http://knowledge-graph-agent:8008
      - MEM0_NEO4J_URL=bolt://neo4j:7687
      - MEM0_NEO4J_USER=neo4j
      - MEM0_NEO4J_PASSWORD=mc_password
      - MEM0_PG_DSN=postgresql://mc:mc_password@postgres:5432/missioncontrol
    networks:
      - mc-net
    depends_on:
      control-plane:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8008/.well-known/agent-card.json').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Memory Agent ─────────────────────────────────────────────────────────
  memory-agent:
    build:
      context: .
      dockerfile: Dockerfile.memory-agent
    ports:
      - "8009:8009"
    env_file: ".env"
    environment:
      - LOG_LEVEL=INFO
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - CONTROL_PLANE_URL=http://control-plane:8000
      - MEMORY_AGENT_URL=http://memory-agent:8009
      - MEMORY_NEO4J_URL=bolt://neo4j:7687
      - MEMORY_NEO4J_USER=neo4j
      - MEMORY_NEO4J_PASSWORD=mc_password
      - MEMORY_PG_DSN=postgresql://mc:mc_password@postgres:5432/missioncontrol
      - MEMORY_EMBEDDING_MODEL=${MEMORY_EMBEDDING_MODEL}
      - MEMORY_EMBEDDING_DIMS=${MEMORY_EMBEDDING_DIMS}
    networks:
      - mc-net
    depends_on:
      control-plane:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8009/.well-known/agent-card.json').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Baseline Store ────────────────────────────────────────────────────────
  baseline-store:
    build:
      context: .
      dockerfile: Dockerfile.baseline-store
    ports:
      - "8010:8010"
    environment:
      - LOG_LEVEL=INFO
      - BASELINE_PG_DSN=postgresql://mc:mc_password@postgres:5432/missioncontrol
      - BASELINE_EMBEDDING_MODEL=${BASELINE_EMBEDDING_MODEL}
      - BASELINE_EMBEDDING_DIMS=${BASELINE_EMBEDDING_DIMS}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      - BASELINE_STORE_URL=http://baseline-store:8010
    env_file: ".env"
    networks:
      - mc-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8010/topics').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── React Dashboard ────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    env_file: ".env"
    ports:
      - "3000:80"
    networks:
      - mc-net
    depends_on:
      control-plane:
        condition: service_healthy
  
  network-tool:
    image: wbitt/network-multitool:latest
    networks:
      - mc-net


networks:
  mc-net:
    driver: bridge

volumes:
  postgres_data:
  pgvector_data:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  neo4j_config: