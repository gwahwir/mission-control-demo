version: "3.9"

services:
  # ── Echo Agent ─────────────────────────────────────────────────────────────
  echo-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    ports:
      - "8001:8001"
    environment:
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/.well-known/agent.json').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Control Plane ──────────────────────────────────────────────────────────
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.control-plane
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - AGENT_URLS=http://echo-agent:8001
    depends_on:
      echo-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/agents').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── React Dashboard ────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      control-plane:
        condition: service_healthy
